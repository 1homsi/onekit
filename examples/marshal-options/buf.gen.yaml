# Buf code generation configuration v2
version: v2

# Managed mode - automatically manages go_package options
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/corezio/onekit/examples/marshal-options/api
    - file_option: go_package_prefix
      module: buf.build/corezio/onekit
      value: ""

plugins:
  - local: protoc-gen-go
    out: ./api
    opt: module=github.com/corezio/onekit/examples/marshal-options/api

  - local: ../../bin/protoc-gen-onekit-go-http
    out: api
    opt:
      - module=github.com/corezio/onekit/examples/marshal-options/api
      - generate_mock=false
